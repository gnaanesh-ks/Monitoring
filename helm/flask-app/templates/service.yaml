apiVersion: v1
kind: Service
metadata:
  name: flask-service
  namespace: {{ .Values.namespace }}
  labels:
    app: flask-app
spec:
  type: {{ .Values.service.type }}
  selector:
    app: flask-app
  ports:
  - name: http
    port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}

